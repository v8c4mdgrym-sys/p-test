<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Galaxy Browser</title>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/baremux/index.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<style>
* { 
box-sizing: border-box; 
margin: 0;
padding: 0;
font-family: 'Outfit', sans-serif;
}

html, body {
width: 100%;
height: 100%;
overflow: hidden;
cursor: url(http://www.rw-designer.com/cursor-extern.php?id=166781), auto;
}

/* Theme Variables */
body {
--bg-gradient-start: #1b2735;
--bg-gradient-end: #090a0f;
--nebula-1: rgba(120, 50, 255, 0.3);
--nebula-2: rgba(255, 50, 150, 0.25);
--nebula-3: rgba(50, 150, 255, 0.2);
--accent-color: rgba(142, 197, 252, 0.4);
--theme-name: 'Galaxy';
}

body[data-theme="galaxy"] {
--bg-gradient-start: #1b2735;
--bg-gradient-end: #090a0f;
--nebula-1: rgba(120, 50, 255, 0.3);
--nebula-2: rgba(255, 50, 150, 0.25);
--nebula-3: rgba(50, 150, 255, 0.2);
--accent-color: rgba(142, 197, 252, 0.4);
}

body[data-theme="jupiter"] {
--bg-gradient-start: #4a2c1a;
--bg-gradient-end: #1a0f08;
--nebula-1: rgba(255, 140, 60, 0.4);
--nebula-2: rgba(200, 120, 80, 0.3);
--nebula-3: rgba(255, 180, 100, 0.25);
--accent-color: rgba(255, 160, 80, 0.5);
}

body[data-theme="saturn"] {
--bg-gradient-start: #3d3520;
--bg-gradient-end: #0f0d08;
--nebula-1: rgba(230, 200, 140, 0.3);
--nebula-2: rgba(200, 160, 100, 0.25);
--nebula-3: rgba(180, 150, 110, 0.2);
--accent-color: rgba(220, 190, 130, 0.4);
}

body[data-theme="mars"] {
--bg-gradient-start: #3d1a1a;
--bg-gradient-end: #1a0505;
--nebula-1: rgba(255, 80, 60, 0.35);
--nebula-2: rgba(200, 60, 40, 0.3);
--nebula-3: rgba(255, 100, 70, 0.25);
--accent-color: rgba(255, 100, 70, 0.4);
}

body[data-theme="neptune"] {
--bg-gradient-start: #1a2d3d;
--bg-gradient-end: #050a0f;
--nebula-1: rgba(60, 120, 255, 0.35);
--nebula-2: rgba(80, 160, 255, 0.3);
--nebula-3: rgba(100, 180, 255, 0.25);
--accent-color: rgba(100, 180, 255, 0.4);
}

/* Galaxy Background */
body {
background: radial-gradient(ellipse at bottom, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
position: relative;
transition: all 0.5s ease;
}

body::before {
content: '';
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-image: 
radial-gradient(ellipse at 20% 80%, var(--nebula-1) 0%, transparent 50%),
radial-gradient(ellipse at 80% 20%, var(--nebula-2) 0%, transparent 50%),
radial-gradient(ellipse at 50% 50%, var(--nebula-3) 0%, transparent 50%);
z-index: 0;
transition: all 0.5s ease;
}

/* Stars */
.stars {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: 1;
}

.star {
position: absolute;
background: white;
border-radius: 50%;
animation: twinkle 4s ease-in-out infinite;
}

@keyframes twinkle {
0%, 100% { opacity: 0.2; transform: scale(1); }
50% { opacity: 1; transform: scale(1.3); }
}

/* Shooting stars */
@keyframes shoot {
0% {
transform: translateX(0) translateY(0);
opacity: 1;
}
100% {
transform: translateX(-300px) translateY(300px);
opacity: 0;
}
}

.shooting-star {
position: absolute;
width: 2px;
height: 2px;
background: white;
border-radius: 50%;
box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
animation: shoot 3s ease-out infinite;
}

/* ===== TOP BAR ===== */
.browser-ui {
position: relative;
height: 115px;
background: rgba(15, 20, 35, 0.7);
backdrop-filter: blur(40px) saturate(180%);
display: flex;
flex-direction: column;
border-bottom: 1px solid rgba(255, 255, 255, 0.1);
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
z-index: 10;
}

/* ===== TABS ===== */
.tabs {
height: 50px;
display: flex;
align-items: center;
padding: 8px 20px;
gap: 8px;
overflow-x: auto;
scrollbar-width: none;
}

.tabs::-webkit-scrollbar {
display: none;
}

.tab {
position: relative;
height: 38px;
min-width: 200px;
max-width: 260px;
padding: 0 18px;
border-radius: 20px 20px 0 0;
background: rgba(255, 255, 255, 0.05);
backdrop-filter: blur(10px);
color: rgba(255, 255, 255, 0.6);
display: flex;
align-items: center;
gap: 10px;
cursor: url(http://www.rw-designer.com/cursor-extern.php?id=166781), pointer;
transition: all 0.3s ease;
border: 1px solid rgba(255, 255, 255, 0.1);
border-bottom: none;
font-size: 13px;
font-weight: 500;
overflow: hidden;
}

.tab::before {
content: '';
position: absolute;
top: 0;
left: 0;
right: 0;
height: 2px;
background: linear-gradient(90deg, 
var(--nebula-1), 
var(--nebula-2), 
var(--nebula-3));
opacity: 0;
transition: opacity 0.3s ease;
}

.tab:hover {
background: rgba(255, 255, 255, 0.08);
color: rgba(255, 255, 255, 0.9);
}

.tab.active {
background: rgba(255, 255, 255, 0.12);
color: white;
box-shadow: 
0 -4px 20px var(--accent-color),
inset 0 1px 0 rgba(255, 255, 255, 0.2);
}

.tab.active::before {
opacity: 1;
}

.tab span {
flex: 1;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}

.tab i {
opacity: .5;
font-size: 13px;
transition: all 0.2s ease;
padding: 4px;
cursor: url(http://www.rw-designer.com/cursor-extern.php?id=166781), pointer;
}

.tab i:hover {
opacity: 1;
color: #ff6b9d;
transform: scale(1.1);
}

.newtab {
width: 40px;
height: 40px;
border-radius: 50%;
border: 1px solid rgba(255, 255, 255, 0.2);
background: rgba(255, 255, 255, 0.08);
backdrop-filter: blur(10px);
color: rgba(255, 255, 255, 0.8);
cursor: url(http://www.rw-designer.com/cursor-extern.php?id=166781), pointer;
transition: all 0.3s ease;
font-size: 16px;
display: flex;
align-items: center;
justify-content: center;
}

.newtab:hover {
background: rgba(255, 255, 255, 0.15);
border-color: rgba(255, 255, 255, 0.4);
transform: scale(1.05);
box-shadow: 0 4px 20px var(--accent-color);
}

/* ===== NAV BAR ===== */
.navbar {
height: 65px;
display: flex;
align-items: center;
gap: 12px;
padding: 0 24px;
}

.nav-controls {
display: flex;
gap: 8px;
}

.navbar button {
width: 42px;
height: 42px;
border-radius: 50%;
border: 1px solid rgba(255, 255, 255, 0.15);
background: rgba(255, 255, 255, 0.08);
backdrop-filter: blur(10px);
color: rgba(255, 255, 255, 0.8);
cursor: url(http://www.rw-designer.com/cursor-extern.php?id=166781), pointer;
transition: all 0.3s ease;
font-size: 15px;
display: flex;
align-items: center;
justify-content: center;
}

.navbar button:hover:not(:disabled) {
background: rgba(255, 255, 255, 0.15);
border-color: rgba(255, 255, 255, 0.3);
transform: translateY(-2px);
box-shadow: 0 6px 20px var(--accent-color);
}

.navbar button:active:not(:disabled) {
transform: translateY(0);
}

.navbar button:disabled {
opacity: 0.3;
cursor: url(http://www.rw-designer.com/cursor-extern.php?id=166781), not-allowed;
}

/* ===== URL BAR ===== */
.urlbar {
flex: 1;
height: 48px;
background: rgba(255, 255, 255, 0.08);
backdrop-filter: blur(20px);
border-radius: 24px;
padding: 0 22px;
display: flex;
align-items: center;
gap: 12px;
border: 1px solid rgba(255, 255, 255, 0.15);
transition: all 0.3s ease;
margin: 0 12px;
}

.urlbar:focus-within {
background: rgba(255, 255, 255, 0.12);
border-color: rgba(255, 255, 255, 0.3);
box-shadow: 
0 0 0 4px rgba(255, 255, 255, 0.1),
0 8px 32px var(--accent-color);
}

.urlbar i {
color: rgba(255, 255, 255, 0.6);
font-size: 15px;
}

.urlbar input {
width: 100%;
height: 100%;
background: transparent;
border: none;
outline: none;
color: white;
font-size: 14px;
font-weight: 500;
cursor: url(http://www.rw-designer.com/cursor-extern.php?id=166781), text;
}

.urlbar input::placeholder {
color: rgba(255, 255, 255, 0.4);
}

/* ===== SETTINGS BUTTON ===== */
#settings-btn {
margin-left: 8px;
}

/* ===== SETTINGS MODAL ===== */
.settings-modal {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.7);
backdrop-filter: blur(10px);
display: none;
align-items: center;
justify-content: center;
z-index: 1000;
}

.settings-modal.active {
display: flex;
}

.settings-content {
background: rgba(20, 25, 40, 0.95);
backdrop-filter: blur(40px);
border-radius: 24px;
padding: 40px;
max-width: 600px;
width: 90%;
border: 1px solid rgba(255, 255, 255, 0.2);
box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

.settings-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 30px;
}

.settings-header h2 {
font-size: 28px;
color: white;
font-weight: 700;
}

.close-settings {
width: 36px;
height: 36px;
border-radius: 50%;
border: 1px solid rgba(255, 255, 255, 0.2);
background: rgba(255, 255, 255, 0.1);
color: white;
cursor: url(http://www.rw-designer.com/cursor-extern.php?id=166781), pointer;
font-size: 18px;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.3s ease;
}

.close-settings:hover {
background: rgba(255, 255, 255, 0.2);
transform: scale(1.1);
}

.settings-section {
margin-bottom: 30px;
}

.settings-section h3 {
font-size: 16px;
color: rgba(255, 255, 255, 0.7);
margin-bottom: 16px;
text-transform: uppercase;
letter-spacing: 1px;
font-weight: 600;
}

.theme-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
gap: 12px;
}

.theme-option {
background: rgba(255, 255, 255, 0.05);
border: 2px solid rgba(255, 255, 255, 0.1);
border-radius: 16px;
padding: 20px;
cursor: url(http://www.rw-designer.com/cursor-extern.php?id=166781), pointer;
transition: all 0.3s ease;
text-align: center;
}

.theme-option:hover {
background: rgba(255, 255, 255, 0.1);
border-color: rgba(255, 255, 255, 0.3);
transform: translateY(-2px);
}

.theme-option.active {
border-color: white;
background: rgba(255, 255, 255, 0.15);
box-shadow: 0 0 20px var(--accent-color);
}

.theme-preview {
width: 100%;
height: 60px;
border-radius: 12px;
margin-bottom: 12px;
position: relative;
overflow: hidden;
}

.theme-preview::before {
content: '';
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
}

.theme-option[data-theme="galaxy"] .theme-preview {
background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
}

.theme-option[data-theme="galaxy"] .theme-preview::before {
background: radial-gradient(ellipse at 30% 70%, rgba(120, 50, 255, 0.4), transparent),
radial-gradient(ellipse at 70% 30%, rgba(255, 50, 150, 0.3), transparent);
}

.theme-option[data-theme="jupiter"] .theme-preview {
background: radial-gradient(ellipse at bottom, #4a2c1a 0%, #1a0f08 100%);
}

.theme-option[data-theme="jupiter"] .theme-preview::before {
background: radial-gradient(ellipse at 30% 70%, rgba(255, 140, 60, 0.5), transparent),
radial-gradient(ellipse at 70% 30%, rgba(200, 120, 80, 0.4), transparent);
}

.theme-option[data-theme="saturn"] .theme-preview {
background: radial-gradient(ellipse at bottom, #3d3520 0%, #0f0d08 100%);
}

.theme-option[data-theme="saturn"] .theme-preview::before {
background: radial-gradient(ellipse at 30% 70%, rgba(230, 200, 140, 0.4), transparent),
radial-gradient(ellipse at 70% 30%, rgba(200, 160, 100, 0.3), transparent);
}

.theme-option[data-theme="mars"] .theme-preview {
background: radial-gradient(ellipse at bottom, #3d1a1a 0%, #1a0505 100%);
}

.theme-option[data-theme="mars"] .theme-preview::before {
background: radial-gradient(ellipse at 30% 70%, rgba(255, 80, 60, 0.5), transparent),
radial-gradient(ellipse at 70% 30%, rgba(200, 60, 40, 0.4), transparent);
}

.theme-option[data-theme="neptune"] .theme-preview {
background: radial-gradient(ellipse at bottom, #1a2d3d 0%, #050a0f 100%);
}

.theme-option[data-theme="neptune"] .theme-preview::before {
background: radial-gradient(ellipse at 30% 70%, rgba(60, 120, 255, 0.5), transparent),
radial-gradient(ellipse at 70% 30%, rgba(80, 160, 255, 0.4), transparent);
}

.theme-name {
color: white;
font-size: 14px;
font-weight: 600;
}

/* ===== VIEWPORT ===== */
.viewframe {
position: absolute;
top: 115px;
left: 0;
width: 100%;
height: calc(100% - 115px);
border: none;
display: none;
}

.viewframe.active {
display: block;
}

/* ===== NTP ===== */
.ntp {
position: absolute;
top: 115px;
left: 0;
width: 100%;
height: calc(100% - 115px);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
pointer-events: none;
overflow-y: auto;
padding: 40px 20px;
z-index: 2;
}

.ntp-content {
position: relative;
z-index: 1;
text-align: center;
max-width: 1200px;
pointer-events: auto;
}

.ntp h1 {
font-size: 110px;
font-weight: 800;
margin: 0;
background: linear-gradient(135deg, 
#ffffff 0%, 
#e0c3fc 20%, 
#8ec5fc 40%, 
#e0c3fc 60%, 
#ffffff 100%);
background-size: 200% auto;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
filter: drop-shadow(0 0 60px var(--accent-color));
letter-spacing: -2px;
animation: shimmer 6s linear infinite;
text-shadow: 0 0 80px rgba(255, 255, 255, 0.5);
}

@keyframes shimmer {
0% { background-position: 0% center; }
100% { background-position: 200% center; }
}

.ntp-subtitle {
font-size: 20px;
color: rgba(255, 255, 255, 0.7);
margin-top: 16px;
font-weight: 500;
letter-spacing: 2px;
}

/* Quick Links */
.quick-links {
margin-top: 70px;
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 16px;
max-width: 920px;
width: 100%;
}

.quick-link {
background: rgba(255, 255, 255, 0.08);
backdrop-filter: blur(20px);
border: 1px solid rgba(255, 255, 255, 0.15);
border-radius: 24px;
padding: 28px 20px;
cursor: url(http://www.rw-designer.com/cursor-extern.php?id=166781), pointer;
transition: all 0.3s ease;
text-decoration: none;
display: flex;
flex-direction: column;
align-items: center;
gap: 14px;
position: relative;
overflow: hidden;
}

.quick-link::before {
content: '';
position: absolute;
top: 0;
left: 0;
right: 0;
bottom: 0;
background: linear-gradient(135deg, 
var(--nebula-1), 
var(--nebula-2),
var(--nebula-3));
opacity: 0;
transition: opacity 0.3s ease;
}

.quick-link:hover {
background: rgba(255, 255, 255, 0.15);
border-color: rgba(255, 255, 255, 0.3);
transform: translateY(-4px) scale(1.02);
box-shadow: 
0 20px 40px var(--accent-color),
inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

.quick-link:hover::before {
opacity: 0.3;
}

.quick-link-icon {
width: 56px;
height: 56px;
background: rgba(255, 255, 255, 0.1);
backdrop-filter: blur(10px);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 26px;
color: white;
position: relative;
z-index: 1;
transition: all 0.3s ease;
border: 1px solid rgba(255, 255, 255, 0.2);
}

.quick-link:hover .quick-link-icon {
background: rgba(255, 255, 255, 0.2);
box-shadow: 0 8px 24px var(--accent-color);
transform: scale(1.1);
}

.quick-link-name {
color: rgba(255, 255, 255, 0.95);
font-size: 14px;
font-weight: 600;
position: relative;
z-index: 1;
}

/* Floating particles */
.particle {
position: absolute;
background: rgba(255, 255, 255, 0.4);
border-radius: 50%;
pointer-events: none;
animation: float 20s infinite;
}

@keyframes float {
0%, 100% {
transform: translateY(0) translateX(0);
opacity: 0;
}
10% {
opacity: 1;
}
90% {
opacity: 1;
}
100% {
transform: translateY(-1000px) translateX(100px);
opacity: 0;
}
}

/* Responsive */
@media (max-width: 768px) {
.ntp h1 {
font-size: 56px;
}
.quick-links {
grid-template-columns: repeat(2, 1fr);
gap: 12px;
}
.navbar {
padding: 0 16px;
}
.theme-grid {
grid-template-columns: repeat(2, 1fr);
}
}
</style>
</head>

<script>
// Create stars
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 200; i++) {
const star = document.createElement('div');
star.className = 'star';
const size = Math.random() * 2.5 + 0.5;
star.style.width = size + 'px';
star.style.height = size + 'px';
star.style.left = Math.random() * 100 + '%';
star.style.top = Math.random() * 100 + '%';
star.style.animationDelay = Math.random() * 4 + 's';
star.style.animationDuration = (Math.random() * 3 + 2) + 's';
starsContainer.appendChild(star);
}

// Create shooting stars
for (let i = 0; i < 5; i++) {
const shootingStar = document.createElement('div');
shootingStar.className = 'shooting-star';
shootingStar.style.left = Math.random() * 100 + '%';
shootingStar.style.top = Math.random() * 50 + '%';
shootingStar.style.animationDelay = Math.random() * 8 + 's';
shootingStar.style.animationDuration = (Math.random() * 2 + 2) + 's';
starsContainer.appendChild(shootingStar);
}

// Create floating particles
function createParticle() {
const particle = document.createElement('div');
particle.className = 'particle';
const size = Math.random() * 4 + 2;
particle.style.width = size + 'px';
particle.style.height = size + 'px';
particle.style.left = Math.random() * 100 + '%';
particle.style.bottom = '-20px';
particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
document.body.appendChild(particle);
setTimeout(() => particle.remove(), 25000);
}

setInterval(createParticle, 2000);

// Settings modal
const settingsBtn = document.getElementById('settings-btn');
const settingsModal = document.getElementById('settings-modal');
const closeSettings = document.getElementById('close-settings');

settingsBtn.onclick = () => {
settingsModal.classList.add('active');
};

closeSettings.onclick = () => {
settingsModal.classList.remove('active');
};

settingsModal.onclick = (e) => {
if (e.target === settingsModal) {
settingsModal.classList.remove('active');
}
};

// Theme switching
const themeOptions = document.querySelectorAll('.theme-option');
themeOptions.forEach(option => {
option.addEventListener('click', () => {
const theme = option.dataset.theme;
document.body.dataset.theme = theme;
localStorage.setItem('galaxy-theme', theme);

themeOptions.forEach(opt => opt.classList.remove('active'));
option.classList.add('active');
});
});

// Load saved theme
const savedTheme = localStorage.getItem('galaxy-theme');
if (savedTheme) {
document.body.dataset.theme = savedTheme;
themeOptions.forEach(opt => {
if (opt.dataset.theme === savedTheme) {
opt.classList.add('active');
} else {
opt.classList.remove('active');
}
});
}

navigator.serviceWorker?.register("/uv/sw.js")

const connection = new BareMux.BareMuxConnection("/baremux/worker.js")
connection.setTransport("/libcurl/index.mjs", [{ websocket: "wss://wisp.rhw.one/" }])

const tabsEl = document.getElementById("tabs")
const newTabBtn = document.getElementById("newtab")
const urlInput = document.getElementById("url")
const ntp = document.getElementById("ntp")
const backBtn = document.getElementById("back")
const forwardBtn = document.getElementById("forward")

let tabs = []
let activeId = null
let idCounter = 0

function createTab(url = "") {
const id = idCounter++

const iframe = document.createElement("iframe")
iframe.className = "viewframe"
iframe.dataset.id = id

iframe.setAttribute("sandbox",
"allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox"
)

document.body.appendChild(iframe)

const tabBtn = document.createElement("div")
tabBtn.className = "tab"
tabBtn.dataset.id = id
tabBtn.innerHTML = `<span>New Tab</span><i class="fas fa-xmark"></i>`

tabBtn.addEventListener("click", e => {
if (e.target.tagName === "I") closeTab(id)
else activateTab(id)
})

tabsEl.insertBefore(tabBtn, newTabBtn)

tabs.push({ id, iframe, tabBtn, history: [], index: -1 })
activateTab(id)

if (url) navigate(url)
}

function activateTab(id) {
activeId = id

tabs.forEach(t => {
t.iframe.classList.toggle("active", t.id === id)
t.tabBtn.classList.toggle("active", t.id === id)
})

const tab = getTab()
if (!tab) return

updateNavButtons()

if (tab.index >= 0) {
urlInput.value = tab.history[tab.index]
ntp.style.display = "none"
} else {
urlInput.value = ""
ntp.style.display = "flex"
}
}

function closeTab(id) {
if (tabs.length === 1) return

const i = tabs.findIndex(t => t.id === id)
const tab = tabs[i]

tab.iframe.remove()
tab.tabBtn.remove()
tabs.splice(i, 1)

activateTab(tabs[Math.max(0, i - 1)].id)
}

function normalize(input) {
input = input.trim()
if (!input.includes(".") && !input.startsWith("localhost")) {
return "https://search.brave.com/search?q=" + encodeURIComponent(input)
}
if (!input.startsWith("http")) return "https://" + input
return input
}

function navigate(input, push = true) {
const tab = getTab()
if (!tab) return

const url = normalize(input)

if (push) {
tab.history = tab.history.slice(0, tab.index + 1)
tab.history.push(url)
tab.index++
}

tab.iframe.src = __uv$config.prefix + __uv$config.encodeUrl(url)
urlInput.value = url
ntp.style.display = "none"
updateNavButtons()

tab.iframe.onload = () => {
try {
const title = tab.iframe.contentDocument?.title
if (title) {
tab.tabBtn.querySelector("span").textContent = title
} else {
tab.tabBtn.querySelector("span").textContent = new URL(url).hostname
}
} catch (e) {
tab.tabBtn.querySelector("span").textContent = new URL(url).hostname
}
}
}

function getTab() {
return tabs.find(t => t.id === activeId)
}

function updateNavButtons() {
const t = getTab()
if (!t) return
backBtn.disabled = !t || t.index <= 0
forwardBtn.disabled = !t || t.index >= t.history.length - 1
}

/* ===== CONTROLS ===== */
back.onclick = () => {
const t = getTab()
if (!t || t.index <= 0) return
t.index--
navigate(t.history[t.index], false)
}

forward.onclick = () => {
const t = getTab()
if (!t || t.index >= t.history.length - 1) return
t.index++
navigate(t.history[t.index], false)
}

reload.onclick = () => {
const t = getTab()
if (!t || t.index < 0) return
t.iframe.src = t.iframe.src
}

popout.onclick = () => {
const t = getTab()
if (!t || t.index < 0) return
const originalUrl = t.history[t.index]
window.open(originalUrl, "_blank")
}

form.onsubmit = e => {
e.preventDefault()
if (urlInput.value.trim()) navigate(urlInput.value)
}

newTabBtn.onclick = () => createTab()

// Quick links
document.querySelectorAll('.quick-link').forEach(link => {
link.addEventListener('click', e => {
e.preventDefault()
const url = link.dataset.url
navigate(url)
})
})

createTab()
</script>

</body>
</html>
